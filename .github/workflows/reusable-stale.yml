name: Reusable Stale Bot

on:
  workflow_call:
    inputs:
      days_before_stale:
        description: 'Days of inactivity before labeling as stale'
        required: false
        type: number
        default: 30
      days_before_close:
        description: 'Days after stale label before closing'
        required: false
        type: number
        default: 7
      exempt_labels:
        description: 'Comma-separated labels exempt from stale processing'
        required: false
        type: string
        default: 'pinned,security'

permissions:
  contents: read

jobs:
  stale:
    name: Label and Close Stale Issues/PRs
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@a90bcbc6539c36a85cdfeb73f7e2f433735f215b # v2.15.0
        with:
          egress-policy: audit

      - uses: actions/stale@v9
        with:
          days-before-stale: ${{ inputs.days_before_stale }}
          days-before-close: ${{ inputs.days_before_close }}
          stale-issue-label: stale
          stale-pr-label: stale
          stale-issue-message: >
            This issue has been automatically labeled as stale because it has not had
            activity in ${{ inputs.days_before_stale }} days. It will be closed in
            ${{ inputs.days_before_close }} days if no further activity occurs.
          stale-pr-message: >
            This pull request has been automatically labeled as stale because it has not had
            activity in ${{ inputs.days_before_stale }} days. It will be closed in
            ${{ inputs.days_before_close }} days if no further activity occurs.
          close-issue-message: 'This issue was closed because it has been stale with no activity.'
          close-pr-message: 'This pull request was closed because it has been stale with no activity.'
          exempt-issue-labels: ${{ inputs.exempt_labels }}
          exempt-pr-labels: ${{ inputs.exempt_labels }}
